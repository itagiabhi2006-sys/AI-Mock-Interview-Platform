spring.application.name=zsecurity

# =========================
# Database
# =========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# =========================
# Mail (Brevo)
# =========================
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =========================
# Error Handling
# =========================
server.error.include-message=always
server.error.include-stacktrace=always

# =========================
# File Upload
# =========================
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# =========================
# Gemini AI
# =========================
gemini.api.key=${GEMINI_API_KEY}
gemini.endpoint=${GEMINI_ENDPOINT}
gemini.model=${GEMINI_MODEL}
gemini.max.tokens=${GEMINI_MAX_TOKENS}
gemini.model.fallbacks=${GEMINI_MODEL_FALLBACKS}

# =========================
# ML Service
# =========================
ml.service.url=${ML_SERVICE_URL}

# =========================
# Question Generator
# =========================
questions.batch-size=25
questions.max-batches-per-run=15
questions.delay-between-batches-ms=8000
questions.min-pool-size=20
questions.tier.high-threshold=80
questions.tier.high-generate=50
questions.tier.mid-threshold=60
questions.tier.mid-generate=20
questions.schedule.cron=0 0 2 * * *

# =========================
# Logging
# =========================
logging.level.com.zsecurity.demo.services.GeminiService=DEBUG